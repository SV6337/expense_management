version: '3.9'

services:
  backend:
    build:
      context: ./backend
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - app-network

  frontend:
    build:
      context: ./expense
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - app-network

  redis:
    image: redis:alpine
    expose:
      - '6379'
    networks:
      - app-network

networks:
  app-network:
    driver: bridge